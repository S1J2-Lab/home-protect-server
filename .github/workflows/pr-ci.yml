name: PR CI
# GitHub Actions 탭에 표시되는 이름

on:
  pull_request:
# base branch 제한 없이 PR이면 CI 수행

permissions:
  contents: read
# 코드 읽기 권한만 허용 (public repo 최소 권한)

jobs:
  check:
    runs-on: ubuntu-latest
    # GitHub이 제공하는 우분투 서버에서 실행
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 레포 코드를 서버에 내려받기

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
        # Java 21 설치 (두 번째 실행부터 캐시로 빠름)

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        # gradlew 실행 권한 부여

      - name: Build and test
        env:
          SPRING_PROFILES_ACTIVE: prod
          EXTERNAL_MOIS_ADDRESS_KEY: ${{ secrets.EXTERNAL_MOIS_ADDRESS_KEY }}
          EXTERNAL_SEOUL_REAL_TRADE_KEY: ${{ secrets.EXTERNAL_SEOUL_REAL_TRADE_KEY }}
          EXTERNAL_MOLIT_BUILDING_KEY: ${{ secrets.EXTERNAL_MOLIT_BUILDING_KEY }}
          EXTERNAL_SEOUL_RENT_KEY: ${{ secrets.EXTERNAL_SEOUL_RENT_KEY }}
          CLOVA_OCR_API_URL: ${{ secrets.CLOVA_OCR_API_URL }}
          CLOVA_OCR_SECRET_KEY: ${{ secrets.CLOVA_OCR_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew build --no-daemon
        # 컴파일 + 테스트 (둘 중 하나라도 실패하면 머지 불가)
